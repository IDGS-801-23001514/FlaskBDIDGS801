{% extends "layout.html" %}
{% block container %}

<div class="flex items-center justify-center min-h-[400px]">
  <div class="w-full max-w-2xl p-8 text-center bg-white border border-gray-200 rounded-2xl shadow-xl dark:bg-neutral-800 dark:border-neutral-700">
    
    <div class="flex justify-center mb-6">
      <div class="p-4 bg-blue-100 rounded-full dark:bg-blue-900/30">
        <svg class="w-16 h-16 text-blue-600 dark:text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 019.918 5.841 50.581 50.581 0 00-2.658.813m-15.482 0l7.741 3.87a6.717 6.717 0 015.482 0l7.741-3.87m-15.482 0L12 14.25l7.741-4.103" />
        </svg>
      </div>
    </div>

    <h1 class="mb-2 text-4xl font-extrabold tracking-tight text-gray-900 dark:text-white">
      ¡Bienvenidos al Sistema!
    </h1>
    <p class="mb-8 text-lg font-normal text-gray-500 dark:text-gray-400">
      Gestiona la información de tus alumnos de forma rápida, sencilla y organizada.
    </p>

    <div class="flex flex-col space-y-4 sm:flex-row sm:justify-center sm:space-y-0">
      <a href="{{ url_for('alumno.alumnos') }}" class="inline-flex items-center justify-center px-8 py-3 text-base font-medium text-center text-white bg-gradient-to-r from-blue-600 to-blue-700 rounded-lg hover:from-blue-700 hover:to-blue-800 focus:ring-4 focus:ring-blue-300 transition-all transform hover:scale-105 shadow-lg shadow-blue-500/30">
        <svg class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        Comenzar Registro
      </a>
    </div>

  </div>
</div>

{% endblock %}
